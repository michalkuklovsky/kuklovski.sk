<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potvrdenie účasti | Michal & Miriam</title>
  <meta name="description" content="Potvrďte účasť na svadbe Michala a Miriam.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">M & M</a>
      <button class="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Domov</a></li>
        <li><a href="story.html" class="nav-link">Náš príbeh</a></li>
        <li><a href="gallery.html" class="nav-link">Galéria</a></li>
        <li><a href="rsvp.html" class="nav-link active">Potvrdenie účasti</a></li>
      </ul>
    </div>
  </nav>

  <section class="section container" style="margin-top: var(--nav-height);">
    <div class="text-center animate-on-scroll">
      <span class="subtitle">Buď naším hosťom</span>
      <h2>Potvrdenie účasti</h2>
      <p style="margin-bottom: 3rem;">Odpovedzte, prosím, do 1. septembra 2026. Dúfame, že prídete!</p>
    </div>

    <div class="form-container animate-on-scroll">
      <form id="rsvpForm">
        <div class="form-group">
          <label for="fullName" class="form-label">Celé meno</label>
          <input type="text" id="fullName" name="fullName" class="form-control" required placeholder="Meno Priezvisko">
        </div>

        <div class="form-group">
          <label class="form-label">Prídete?</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="attending" value="yes" required> S radosťou prídem
            </label>
            <label class="radio-label">
              <input type="radio" name="attending" value="no" required> Žiaľ, nemôžem prísť
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="guests" class="form-label">Počet hostí (vrátane vás)</label>
          <select id="guests" name="guests" class="form-control" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dietary" class="form-label">Stravovacie obmedzenia</label>
          <textarea id="dietary" name="dietary" class="form-control" placeholder="Napr. vegetarián, vegán, bezlepkové..."></textarea>
        </div>

        <div class="form-group">
          <label for="song" class="form-label">Pieseň</label>
          <input type="text" id="song" name="song" class="form-control" placeholder="Zatancujem si, ak zahráte...">
        </div>

        <div class="text-center" style="margin-top: 2rem;">
          <button type="submit" class="btn btn-accent" style="width: 100%;">Odoslať</button>
        </div>
      </form>
    </div>
  </section>

  <footer class="footer">
    <h2>M & M</h2>
    <p>5. septembra 2026</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
